name: 🕐 Inject lastUpdated timestamp

on:
  push:
    branches:
      - main

jobs:
  inject-timestamp:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject lastUpdated + commit
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          node -e "
            const fs   = require('fs');
            const data = JSON.parse(fs.readFileSync('launcher-config.json', 'utf8'));
            data.lastUpdated = process.argv[1];
            fs.writeFileSync('launcher-config.json', JSON.stringify(data, null, 2) + '\n');
            console.log('lastUpdated =', data.lastUpdated);
          " "$TIMESTAMP"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add launcher-config.json
          git diff --cached --quiet && echo "Rien à commiter" && exit 0
          git commit -m "🕐 lastUpdated auto-inject [skip ci]"
          git pull --rebase origin main
          git push
